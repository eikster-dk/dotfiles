# Quick access bindings (most used)
$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec tmux new-session -A -s main
bindd = SUPER SHIFT, RETURN, Browser, exec, $browser

# Programs (day-to-day)
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"

# Web apps
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"

# Development tools
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop

# WLR Which Key menu (SUPER SPACE)
# All other apps accessible via:
#   p -> Programs (day-to-day): 1password, browser, file manager, spotify, obsidian, etc.
#   d -> Development: terminal, tmux, editor, btop, lazydocker
unbind = SUPER, SPACE
bindd = SUPER, SPACE, WLR Which key, exec, wlr-which-key

unbind = SUPER SHIFT, SPACE
bindd = SUPER SHIFT, SPACE, App launcher, exec, walker

# Navigation
unbind = SUPER, h
unbind = SUPER, j
unbind = SUPER, J
unbind = SUPER, k
unbind = SUPER, K
unbind = SUPER, l
unbind = SUPER, L

# Move focus with mainMod + arrow keys
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

bindd = SUPER, u, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle

# Lock + Screen Off
bindd = SUPER CTRL SHIFT, L, Lock + Screen Off, exec, $HOME/.local/bin/omarchy-lock-screen-off
